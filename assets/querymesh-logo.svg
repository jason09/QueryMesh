<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="querymesh logo">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .line { stroke: #0B1020; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .node-main { fill: #3B82F6; }
      .node-alt { fill: #14B8A6; }
      .center { fill: #0B1020; }
      .word { fill: #0B1020; font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif; font-size: 96px; font-weight: 700; letter-spacing: 0.5px; }
      .tag { fill: #475569; font-family: "Manrope", "Avenir Next", "Segoe UI", sans-serif; font-size: 24px; font-weight: 500; letter-spacing: 1px; }
      .q-cut { fill: #ffffff; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="320" rx="24" />

  <g transform="translate(46 40)">
    <!-- mesh lines -->
    <line class="line" x1="114" y1="120" x2="38" y2="38" />
    <line class="line" x1="114" y1="120" x2="190" y2="38" />
    <line class="line" x1="114" y1="120" x2="222" y2="120" />
    <line class="line" x1="114" y1="120" x2="190" y2="202" />
    <line class="line" x1="114" y1="120" x2="38" y2="202" />

    <!-- outer ring to suggest Q -->
    <circle class="center" cx="114" cy="120" r="54" />
    <circle class="q-cut" cx="114" cy="120" r="34" />
    <rect class="center" x="140" y="144" width="32" height="10" rx="5" transform="rotate(35 156 149)" />

    <!-- nodes -->
    <circle class="node-main" cx="38" cy="38" r="16" />
    <circle class="node-alt" cx="190" cy="38" r="16" />
    <circle class="node-main" cx="222" cy="120" r="16" />
    <circle class="node-alt" cx="190" cy="202" r="16" />
    <circle class="node-main" cx="38" cy="202" r="16" />
    <circle class="node-alt" cx="114" cy="120" r="14" />
  </g>

  <text class="word" x="340" y="170">querymesh</text>
  <text class="tag" x="344" y="214">multi-dialect query engine</text>
</svg>
